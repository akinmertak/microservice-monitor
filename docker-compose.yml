services:

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: usersdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      microservices-net:
        ipv4_address: 172.20.0.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build: ./user-service
    container_name: user-service
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/usersdb
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      microservices-net:
        ipv4_address: 172.20.0.3
    restart: unless-stopped

  product-service:
    build: ./product-service
    container_name: product-service
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/productsdb
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      microservices-net:
        ipv4_address: 172.20.0.4
    restart: unless-stopped

  order-service:
    build: ./order-service
    container_name: order-service
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/ordersdb
      USER_SERVICE_URL: http://user-service:8001
      PRODUCT_SERVICE_URL: http://product-service:8002
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      microservices-net:
        ipv4_address: 172.20.0.5
    restart: unless-stopped

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    ports:
      - "8090:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
    networks:
      microservices-net:
        ipv4_address: 172.20.0.6
    restart: unless-stopped

  nagios:
    image: jasonrivers/nagios:latest
    container_name: nagios
    ports:
      - "8080:80"
    volumes:
      - ./nagios/services.cfg:/opt/nagios/etc/conf.d/services.cfg
      - ./nagios/commands_custom.cfg:/opt/nagios/etc/conf.d/commands_custom.cfg
    networks:
      microservices-net:
        ipv4_address: 172.20.0.7
    restart: unless-stopped

networks:
  microservices-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  jenkins_data: